name: Evening Action Items Email

on:
  schedule:
    # 6:00 PM CDT (UTC-5) = 23:00 UTC  — covers Mar–Nov
    # 6:00 PM CST (UTC-6) = 00:00 UTC  — flip to '0 0 * * 2-6' Nov–Mar
    - cron: '0 23 * * 1-5'  # weekdays, 6 PM CDT
  workflow_dispatch:          # manual trigger for testing

jobs:
  send-action-items:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run action items agent
        env:
          ANTHROPIC_API_KEY:          ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CLIENT_ID:           ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET:       ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN:       ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          NOTION_API_TOKEN:           ${{ secrets.NOTION_API_TOKEN }}
          FATHOM_API_KEY:             ${{ secrets.FATHOM_API_KEY }}
          NOTION_ACTION_ITEMS_DB_ID:  ${{ vars.NOTION_ACTION_ITEMS_DB_ID }}
          NOTION_CEMEX_TRACKER_DB_ID: ${{ vars.NOTION_CEMEX_TRACKER_DB_ID }}
          NOTION_USER_ID:             ${{ vars.NOTION_USER_ID }}
          RECIPIENT_EMAIL:            ${{ secrets.RECIPIENT_EMAIL }}
          USER_EMAIL:                 ${{ vars.USER_EMAIL }}
          USER_TIMEZONE:              America/Chicago
        run: python -m agent.action_items_main
